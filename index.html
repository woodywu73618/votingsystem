<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JENTECH 人評會投票</title>

<style>
body{font-family:sans-serif;background:#f4f4f6;margin:0}

/* 卡片 */
.cc{
  background:#fff;
  margin:10px;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  position:relative;
}

/* 投票後淡化 */
.cc.voted-pass,
.cc.voted-fail,
.cc.voted-abs{
  background:rgba(0,0,0,0.02);
  opacity:0.75;
}

/* 按鈕 */
.submit-btn{
  width:100%;
  padding:10px;
  background:#111;
  color:#fff;
  border:none;
  border-radius:6px;
  margin-top:8px;
}

/* 投過變灰 */
.submit-btn.voted{
  background:#eee;
  color:#888;
}

/* 已投票浮標 */
.voted-badge{
  position:absolute;
  top:8px;
  right:8px;
  background:rgba(34,197,94,.1);
  color:#22c55e;
  border:1px solid rgba(34,197,94,.3);
  font-size:10px;
  padding:3px 6px;
  border-radius:999px;
}

/* 動畫 */
.check-anim{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  font-size:60px;
  color:#22c55e;
  opacity:0;
}

.check-anim.show{
  animation:pop .6s ease;
}

@keyframes pop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.5);}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.2);}
  100%{opacity:0;}
}
</style>
</head>

<body>

<div id="app"></div>

<div id="checkAnim" class="check-anim">✓</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

/* Firebase */
firebase.initializeApp({
  apiKey:"AIzaSyA2Zpe...",
  databaseURL:"https://voting-system-6629b-default-rtdb.firebaseio.com"
});
const db=firebase.database();

/* 狀態 */
let S={
  voter:{name:"測試",empId:"001"},
  candidates:{},
  records:[],
  myVotes:{}
};

/* 防重複 */
function hasVoted(cid){
  return localStorage.getItem("vote_"+cid)==="1";
}
function markVoted(cid){
  localStorage.setItem("vote_"+cid,"1");
}

/* 動畫 */
function showCheck(){
  const el=document.getElementById("checkAnim");
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),600);
}

/* 讀資料 */
db.ref("candidates").on("value",snap=>{
  S.candidates=snap.val()||{};
  render();
});

db.ref("vote_records").on("value",snap=>{
  const data=snap.val()||{};
  S.records=Object.values(data);

  S.myVotes={};
  S.records.forEach(r=>{
    if(r.empId===S.voter.empId){
      S.myVotes[r.candidateId]=r;
    }
  });

  render();
});

/* 投票 */
async function vote(id,type){
  if(hasVoted(id)) return alert("已投過");

  const field=type==="pass"?"passCount":
               type==="fail"?"failCount":"absCount";

  await db.ref("candidates/"+id+"/"+field)
    .transaction(v=>(v||0)+1);

  await db.ref("vote_records").push({
    candidateId:id,
    empId:S.voter.empId,
    result:type
  });

  markVoted(id);
  showCheck();
}

/* UI */
function render(){
  let html="";

  Object.entries(S.candidates).forEach(([id,c])=>{
    const my=S.myVotes[id];
    const has=!!my;

    html+=`
    <div class="cc ${has?"voted-"+my.result:""}">
      ${has?'<div class="voted-badge">✓ 已投票</div>':""}

      <b>${c.name}</b><br>
      通過:${c.passCount||0} 不通過:${c.failCount||0} 棄權:${c.absCount||0}

      <button class="submit-btn ${has?"voted":""}" onclick="vote('${id}','pass')">
        ${has?"修改投票結果":"投票"}
      </button>
    </div>
    `;
  });

  document.getElementById("app").innerHTML=html;
}

</script>

</body>
</html>
