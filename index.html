<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
/* ========= 新增區 ========= */

// 防裝置重複投票
function hasVotedDevice(cid) {
  return localStorage.getItem('vote_' + cid) === '1';
}
function markVotedDevice(cid) {
  localStorage.setItem('vote_' + cid, '1');
}

// 投票截止
let voteDeadline = null;

db.ref('settings/deadline').on('value', snap => {
  voteDeadline = snap.val();
});

function isVotingClosed() {
  if (!voteDeadline) return false;
  return Date.now() > voteDeadline;
}

// 投票動畫
function showSuccessEffect() {
  document.body.style.transform = "scale(0.98)";
  setTimeout(() => {
    document.body.style.transform = "scale(1)";
  }, 150);
}

// 匯出 CSV
function exportCSV() {
  let rows = [
    ['姓名','工號','案件','結果','不通過原因','時間']
  ];

  S.records.forEach(r => {
    const reasons = (r.failReasons || [])
      .map(k => FAIL_REASONS.find(f=>f.key===k)?.label || k)
      .join('、');

    rows.push([
      r.name,
      r.empId,
      r.candidateName,
      r.result,
      reasons,
      r.time
    ]);
  });

  let csv = rows.map(r => r.join(',')).join('\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');

  link.href = URL.createObjectURL(blob);
  link.download = '投票結果.csv';
  link.click();
}

// 設定截止時間
function saveDeadline() {
  const val = document.getElementById('deadline-input').value;
  if (!val) return showToast('請選擇時間', true);

  const timestamp = new Date(val).getTime();
  db.ref('settings/deadline').set(timestamp);

  showToast('✅ 已設定截止時間');
}

/* ========= 修改 submitVote ========= */

async function submitVote(cid) {
  if (!S.voter) { showToast('請先登入', true); return; }

  if (hasVotedDevice(cid)) {
    showToast('⚠️ 此裝置已投過票', true);
    return;
  }

  if (isVotingClosed()) {
    showToast('⛔ 投票已截止', true);
    return;
  }

  const result = S.sel[cid];
  if (!result) { showToast('請選擇投票', true); return; }

  const c = S.candidates[cid];

  const failReasons = result === 'fail'
    ? Object.entries(S.failSel[cid]||{})
        .filter(([,v])=>v).map(([k])=>k)
    : [];

  try {
    const newField = result==='pass'?'passCount':
                     result==='fail'?'failCount':'absCount';

    await db.ref('candidates/'+cid+'/'+newField)
      .transaction(v => (v||0)+1);

    await db.ref('vote_records').push({
      empId: S.voter.empId,
      name: S.voter.name,
      candidateId: cid,
      candidateName: c.name,
      result,
      failReasons,
      timestamp: Date.now(),
      time: new Date().toLocaleString('zh-TW')
    });

    markVotedDevice(cid);
    showSuccessEffect();

    showToast('✅ 投票成功');

  } catch(e) {
    showToast('提交失敗', true);
  }
}

/* ========= 圖表 ========= */

let chart;

function renderChart() {
  const labels = [];
  const passData = [];
  const failData = [];
  const absData = [];

  Object.values(S.candidates).forEach(c => {
    labels.push(c.name);
    passData.push(c.passCount || 0);
    failData.push(c.failCount || 0);
    absData.push(c.absCount || 0);
  });

  const ctx = document.getElementById('chart');

  if (!ctx) return;

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '通過', data: passData },
        { label: '不通過', data: failData },
        { label: '棄權', data: absData }
      ]
    },
    options: {
      responsive: true
    }
  });
}

/* ========= 自動更新圖表 ========= */

db.ref('candidates').on('value', snap => {
  S.candidates = snap.val() || {};
  renderCandidates();
  renderResults();
  renderChart();   // ⭐新增
});

db.ref('vote_records').on('value', snap => {
  const data = snap.val() || {};
  S.records = Object.values(data);
  renderChart();   // ⭐新增
});

/* ========= UI 鎖定 ========= */

function isDisabled(noLogin) {
  return noLogin || isVotingClosed() ? 'disabled' : '';
}
</script>
