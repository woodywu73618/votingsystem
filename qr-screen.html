<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掃描投票 QR Code</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&family=Bebas+Neue&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--gold:#f5c842;--bg:#050810;--surface:rgba(255,255,255,.04);--border:rgba(245,200,66,.2)}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:white;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative}
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0}
  .star{position:absolute;width:2px;height:2px;background:white;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite var(--delay)}
  @keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.8}}
  .glow-bg{position:fixed;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 50%,rgba(245,200,66,.07) 0%,transparent 70%);pointer-events:none;z-index:0}
  .corner{position:fixed;width:80px;height:80px;border-color:rgba(245,200,66,.3);border-style:solid;z-index:1}
  .corner-tl{top:24px;left:24px;border-width:2px 0 0 2px}.corner-tr{top:24px;right:24px;border-width:2px 2px 0 0}
  .corner-bl{bottom:24px;left:24px;border-width:0 0 2px 2px}.corner-br{bottom:24px;right:24px;border-width:0 2px 2px 0}
  .main{position:relative;z-index:2;display:grid;grid-template-columns:1fr auto 1fr;gap:60px;align-items:center;padding:40px;max-width:1100px;width:100%}
  .title-block{text-align:right}
  .event-label{font-size:12px;letter-spacing:.3em;color:var(--gold);opacity:.7;margin-bottom:16px;font-weight:300}
  .main-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,7vw,90px);letter-spacing:.05em;line-height:.95;color:white;margin-bottom:20px}
  .main-title span{display:block;color:var(--gold);text-shadow:0 0 40px rgba(245,200,66,.5)}
  .desc{font-size:16px;font-weight:300;color:rgba(255,255,255,.5);line-height:1.7;margin-bottom:28px}
  .steps{display:flex;flex-direction:column;gap:10px;align-items:flex-end}
  .step{display:flex;align-items:center;gap:12px;font-size:14px;color:rgba(255,255,255,.7)}
  .step-num{width:26px;height:26px;border:1px solid rgba(245,200,66,.4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-family:'Bebas Neue',sans-serif;color:var(--gold);flex-shrink:0}
  .qr-block{display:flex;flex-direction:column;align-items:center}
  .qr-frame{position:relative;padding:28px;background:white;border-radius:24px;box-shadow:0 0 0 1px rgba(245,200,66,.3),0 0 60px rgba(245,200,66,.2),0 20px 60px rgba(0,0,0,.5);animation:float 4s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .qr-frame::before,.qr-frame::after{content:'';position:absolute;width:24px;height:24px;border-color:var(--gold);border-style:solid;border-radius:4px}
  .qr-frame::before{top:-8px;left:-8px;border-width:3px 0 0 3px}
  .qr-frame::after{bottom:-8px;right:-8px;border-width:0 3px 3px 0}
  .qr-label{margin-top:24px;text-align:center}
  .qr-label-main{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.15em;color:var(--gold);text-shadow:0 0 20px rgba(245,200,66,.5)}
  .qr-label-sub{font-size:12px;color:rgba(255,255,255,.35);letter-spacing:.1em;margin-top:4px}
  .url-display{margin-top:14px;background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.2);border-radius:8px;padding:8px 16px;font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.05em;word-break:break-all;text-align:center;max-width:260px}
  .live-block{text-align:left}
  .live-indicator{display:inline-flex;align-items:center;gap:8px;margin-bottom:24px}
  .live-dot{width:10px;height:10px;background:#ff4444;border-radius:50%;animation:livepulse 1.2s ease-in-out infinite;box-shadow:0 0 12px rgba(255,68,68,.6)}
  @keyframes livepulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.85)}}
  .live-text{font-size:12px;letter-spacing:.25em;color:#ff6666;font-weight:500}
  .counter-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 32px;margin-bottom:20px}
  .counter-label{font-size:11px;letter-spacing:.2em;color:rgba(255,255,255,.3);margin-bottom:8px}
  .counter-num{font-family:'Bebas Neue',sans-serif;font-size:72px;color:var(--gold);line-height:1;text-shadow:0 0 30px rgba(245,200,66,.4);letter-spacing:.05em;transition:all .3s}
  .counter-unit{font-size:14px;color:rgba(255,255,255,.4);margin-top:4px}
  .time-box{font-size:13px;color:rgba(255,255,255,.3);letter-spacing:.1em}
  .time-value{font-size:20px;color:rgba(255,255,255,.6);margin-top:4px;letter-spacing:.05em}
  .tagline{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:2;font-size:11px;letter-spacing:.25em;color:rgba(255,255,255,.15);white-space:nowrap}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="glow-bg"></div>
<div class="corner corner-tl"></div><div class="corner corner-tr"></div>
<div class="corner corner-bl"></div><div class="corner corner-br"></div>
<div class="main">
  <div class="title-block">
    <div class="event-label">2026 · 年度評審投票</div>
    <div class="main-title">候選人<br><span>投票</span></div>
    <div class="desc">請評審掃描右方 QR Code<br>進入投票頁面，完成投票</div>
    <div class="steps">
      <div class="step"><span>掃描 QR Code 進入頁面</span><div class="step-num">1</div></div>
      <div class="step"><span>輸入姓名與工號確認身份</span><div class="step-num">2</div></div>
      <div class="step"><span>選擇候選人完成投票</span><div class="step-num">3</div></div>
    </div>
  </div>
  <div class="qr-block">
    <div class="qr-frame"><div id="qrcode"></div></div>
    <div class="qr-label"><div class="qr-label-main">SCAN TO VOTE</div><div class="qr-label-sub">掃描此處開始投票</div></div>
    <div class="url-display">https://woodywu73618.github.io/votingsystem/</div>
  </div>
  <div class="live-block">
    <div class="live-indicator"><div class="live-dot"></div><div class="live-text">LIVE</div></div>
    <div class="counter-box">
      <div class="counter-label">目前投票數</div>
      <div class="counter-num" id="vote-counter">0</div>
      <div class="counter-unit">票</div>
    </div>
    <div class="time-box"><div>現在時間</div><div class="time-value" id="clock">00:00:00</div></div>
  </div>
</div>
<div class="tagline">匿名投票 · 即時統計 · 公正透明</div>
<script>
const s=document.getElementById('stars');
for(let i=0;i<120;i++){const el=document.createElement('div');el.className='star';el.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:${Math.random()*4}s;opacity:${Math.random()*.5}`;s.appendChild(el);}
new QRCode(document.getElementById('qrcode'),{text:'https://woodywu73618.github.io/votingsystem/',width:220,height:220,colorDark:'#1a1a2e',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});
setInterval(()=>{const n=new Date();document.getElementById('clock').textContent=[n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');},1000);
firebase.initializeApp({apiKey:"AIzaSyA2ZpeIZDLEpysnECE0WMvYoUkbrZ-SnK8",authDomain:"voting-system-6629b.firebaseapp.com",databaseURL:"https://voting-system-6629b-default-rtdb.firebaseio.com",projectId:"voting-system-6629b",storageBucket:"voting-system-6629b.firebasestorage.app",messagingSenderId:"769201801560",appId:"1:769201801560:web:f4144db3ad9310855cbd2d"});
firebase.database().ref('votes').on('value',snap=>{
  const v=snap.val()||{};
  document.getElementById('vote-counter').textContent=Object.values(v).reduce((a,b)=>a+b,0);
});
</script>
</body>
</html>
