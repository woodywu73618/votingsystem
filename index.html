<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投票系統</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{font-family:sans-serif;background:#f5f6fa;margin:0}
.container{padding:16px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px}
button{padding:10px;border:none;border-radius:6px;margin:5px;cursor:pointer}
.pass{background:#22c55e;color:#fff}
.fail{background:#ef4444;color:#fff}
.abs{background:#f59e0b;color:#fff}
</style>
</head>

<body>

<div class="container">

<h2>投票系統</h2>

<input id="name" placeholder="姓名">
<input id="empId" placeholder="工號">
<button onclick="login()">登入</button>

<hr>

<div id="vote-area"></div>

<hr>

<h3>📊 統計圖</h3>
<canvas id="chart"></canvas>

<hr>

<h3>⚙️ 設定</h3>
<input type="datetime-local" id="deadline">
<button onclick="setDeadline()">設定截止</button>
<button onclick="exportCSV()">匯出Excel</button>

</div>

<script>

/* Firebase */
firebase.initializeApp({
  apiKey:"AIzaSyA2Z...",
  databaseURL:"https://voting-system-6629b-default-rtdb.firebaseio.com"
});
const db = firebase.database();

/* 狀態 */
let user = null;
let candidates = {};
let records = [];
let deadline = null;
let chart;

/* 防重複投票 */
function hasVoted(cid){
  return localStorage.getItem("vote_"+cid) === "1";
}
function markVoted(cid){
  localStorage.setItem("vote_"+cid,"1");
}

/* 截止 */
db.ref("settings/deadline").on("value",s=>{
  deadline = s.val();
});
function isClosed(){
  if(!deadline) return false;
  return Date.now() > deadline;
}

/* 登入 */
function login(){
  user={
    name:document.getElementById("name").value,
    empId:document.getElementById("empId").value
  };
  render();
}

/* 載資料 */
db.ref("candidates").on("value",s=>{
  candidates = s.val()||{};
  render();
  drawChart();
});
db.ref("vote_records").on("value",s=>{
  records = Object.values(s.val()||{});
  drawChart();
});

/* 投票 */
async function vote(cid,type){
  if(!user) return alert("請先登入");

  if(hasVoted(cid)) return alert("此裝置已投過");

  if(isClosed()) return alert("投票已截止");

  let c = candidates[cid];
  let field = type==="pass"?"passCount":
              type==="fail"?"failCount":"absCount";

  await db.ref("candidates/"+cid+"/"+field)
    .transaction(v=>(v||0)+1);

  await db.ref("vote_records").push({
    name:user.name,
    empId:user.empId,
    candidateName:c.name,
    result:type,
    time:new Date().toLocaleString()
  });

  markVoted(cid);
  render();
}

/* 畫面 */
function render(){
  let html="";
  Object.entries(candidates).forEach(([id,c])=>{
    html+=`
    <div class="card">
      <b>${c.name}</b><br>
      通過:${c.passCount||0} 不通過:${c.failCount||0} 棄權:${c.absCount||0}<br>
      ${isClosed()?"⛔已截止":""}<br>
      <button class="pass" onclick="vote('${id}','pass')">通過</button>
      <button class="fail" onclick="vote('${id}','fail')">不通過</button>
      <button class="abs" onclick="vote('${id}','abs')">棄權</button>
    </div>`;
  });
  document.getElementById("vote-area").innerHTML = html;
}

/* 圖表 */
function drawChart(){
  const labels=[],p=[],f=[],a=[];

  Object.values(candidates).forEach(c=>{
    labels.push(c.name);
    p.push(c.passCount||0);
    f.push(c.failCount||0);
    a.push(c.absCount||0);
  });

  const ctx=document.getElementById("chart");

  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:"bar",
    data:{
      labels,
      datasets:[
        {label:"通過",data:p},
        {label:"不通過",data:f},
        {label:"棄權",data:a}
      ]
    }
  });
}

/* 匯出 */
function exportCSV(){
  let rows=[["姓名","工號","案件","結果","時間"]];
  records.forEach(r=>{
    rows.push([r.name,r.empId,r.candidateName,r.result,r.time]);
  });
  let csv=rows.map(r=>r.join(",")).join("\n");

  let blob=new Blob([csv]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="投票.csv";
  a.click();
}

/* 設定截止 */
function setDeadline(){
  let val=document.getElementById("deadline").value;
  db.ref("settings/deadline").set(new Date(val).getTime());
}

</script>

</body>
</html>
